<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PackHog Visual Packing List</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    
    <style>
        :root {
            --bg-color: #f0f2f5;
            --primary: #2c3e50;
            --accent: #27ae60;
            --card-bg: #ffffff;
            --danger: #e74c3c;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center;
            color: var(--primary);
        }

        h1 { margin-bottom: 20px; }

        .config-panel {
            background: white; padding: 15px 25px; border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05); margin-bottom: 20px;
            display: flex; flex-direction: column; gap: 15px;
            width: 100%; max-width: 800px; align-items: center;
        }

        .toggle-row {
            display: flex; flex-wrap: wrap; justify-content: center; gap: 15px;
            font-weight: bold; border-bottom: 1px solid #eee; padding-bottom: 10px;
        }

        .toggle-row label { cursor: pointer; display: flex; align-items: center; gap: 5px; }

        .tabs { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; margin-bottom: 20px; }
        
        .tab-btn {
            padding: 10px 18px; cursor: pointer; border: none;
            background: #dcdde1; border-radius: 20px; font-weight: 600;
            transition: all 0.2s;
        }

        .tab-btn.active { background: var(--primary); color: white; }

        .controls { margin-bottom: 20px; }
        .btn { padding: 8px 16px; border-radius: 6px; border: none; cursor: pointer; font-weight: bold; margin: 0 5px; color: white; }
        .check-all { background: var(--accent); }
        .clear-all { background: var(--danger); }

        #content-area { width: 100%; max-width: 800px; min-height: 300px; }
        .packing-page { display: none; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; }
        .packing-page.active { display: grid; }

        .item-card {
            background: var(--card-bg); padding: 12px; border-radius: 10px;
            text-align: center; box-shadow: 0 3px 6px rgba(0,0,0,0.1);
            transition: opacity 0.4s ease, transform 0.4s ease;
        }

        .item-card.hidden { opacity: 0; transform: scale(0.85); pointer-events: none; }

        .img-container {
            width: 100%; height: 110px; background: #f8f9fa;
            border-radius: 6px; margin-bottom: 10px;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden; border: 1px solid #eee;
        }

        .img-container img { width: 100%; height: 100%; object-fit: cover; }
        .coming-soon { font-size: 11px; color: #95a5a6; text-transform: uppercase; font-weight: bold; }

        #summary-stats { width: 100%; max-width: 800px; margin-top: 30px; }
    </style>
</head>
<body>

    <h1>PackHog List</h1>

    <div class="config-panel">
        <div class="toggle-row">
            <label><input type="checkbox" class="activity-filter" value="hiking" checked onchange="initApp()"> 🥾 Hiking</label>
            <label><input type="checkbox" class="activity-filter" value="ice climbing" onchange="initApp()"> ⛏️ Ice</label>
            <label><input type="checkbox" class="activity-filter" value="rock climbing" onchange="initApp()"> 🧗 Rock</label>
            <label><input type="checkbox" class="activity-filter" value="skiing" onchange="initApp()"> ⛷️ Skiing</label>
            <label><input type="checkbox" id="overnight-check" onchange="initApp()"> 🌙 Overnight</label>
        </div>
        
        <div id="tabs-container" class="tabs"></div>

        <div class="controls">
            <button class="btn check-all" onclick="toggleAll(true)">Check All</button>
            <button class="btn clear-all" onclick="toggleAll(false)">Reset Page</button>
        </div>
    </div>

    <div id="content-area"></div>
    <div id="summary-stats"></div>

    <script>
        let gearData = [];

        // 1. Fetch Data (Original Logic)
        Papa.parse("dist/packhog.csv?v=" + Date.now(), {
            download: true,
            header: false, 
            skipEmptyLines: true,
            complete: function(results) {
                const rows = results.data;
                if (!rows || rows.length < 2) return;
                gearData = rows.slice(1).map(row => ({
                    category: row[0] ? row[0].trim() : "Misc",
                    name: row[1] ? row[1].trim() : "Unknown Item",
                    image: row[2] ? row[2].trim() : ""
                })).filter(item => item.category !== "");

                initApp(); 
            }
        });

        // 2. Build UI with Filtering
        function initApp() {
            const isOvernight = document.getElementById('overnight-check').checked;
            const tabsContainer = document.getElementById('tabs-container');
            const contentArea = document.getElementById('content-area');
            
            // Get which activities are checked
            const activeActivities = Array.from(document.querySelectorAll('.activity-filter:checked')).map(cb => cb.value.toLowerCase());

            let categories = [...new Set(gearData.map(item => item.category))];

            // FILTER LOGIC
            categories = categories.filter(cat => {
                const lowCat = cat.toLowerCase();
                
                // If it's an overnight category, hide it if overnight isn't checked
                if (lowCat.includes('overnight') && !isOvernight) return false;

                // Check if category name matches "Skiing", "Ice Climbing", etc.
                const isHikingCat = lowCat.includes('hiking');
                const isSkiingCat = lowCat.includes('skiing');
                const isRockCat = lowCat.includes('rock climbing');
                const isIceCat = lowCat.includes('ice climbing');

                // If it's a specific activity category, only show if that activity is checked
                if (isHikingCat && !activeActivities.includes('hiking')) return false;
                if (isSkiingCat && !activeActivities.includes('skiing')) return false;
                if (isRockCat && !activeActivities.includes('rock climbing')) return false;
                if (isIceCat && !activeActivities.includes('ice climbing')) return false;

                return true; // Show everything else (Base, Hot Sport, etc.)
            });

            tabsContainer.innerHTML = '';
            contentArea.innerHTML = '';

            categories.forEach((cat, index) => {
                const safeId = "page-" + cat.replace(/[^a-z0-9]/gi, '-').toLowerCase();

                const btn = document.createElement('button');
                btn.className = `tab-btn ${index === 0 ? 'active' : ''}`;
                btn.innerText = cat;
                btn.onclick = (e) => showPage(cat, e.target);
                tabsContainer.appendChild(btn);

                const page = document.createElement('div');
                page.id = safeId;
                page.className = `packing-page ${index === 0 ? 'active' : ''}`;
                
                const items = gearData.filter(i => i.category === cat);
                items.forEach(item => {
                    const imgPath = item.image ? `dist/${item.image}` : null;
                    const imgHTML = imgPath 
                        ? `<img src="${imgPath}" alt="${item.name}" onerror="this.parentElement.innerHTML='<span class=\'coming-soon\'>Image Missing</span>'">`
                        : `<span class="coming-soon">No Photo</span>`;

                    page.innerHTML += `
                        <div class="item-card">
                            <div class="img-container">${imgHTML}</div>
                            <label>
                                <input type="checkbox" class="gear-checkbox" onchange="handleCheck(this)"> 
                                ${item.name}
                            </label>
                        </div>`;
                });
                contentArea.appendChild(page);
            });
            updateSummary();
        }

        function handleCheck(checkbox) {
            checkbox.closest('.item-card').classList.toggle('hidden', checkbox.checked);
            updateSummary();
        }

        function updateSummary() {
            const allCheckboxes = document.querySelectorAll('.gear-checkbox');
            const total = allCheckboxes.length;
            const checked = Array.from(allCheckboxes).filter(i => i.checked).length;
            const remaining = total - checked;

            const summaryDiv = document.getElementById('summary-stats');
            if (summaryDiv) {
                summaryDiv.innerHTML = `
                    <div style="padding:20px; background:white; border-radius:12px; box-shadow:0 2px 8px rgba(0,0,0,0.05); text-align:center;">
                        <h3 style="margin:0;">${remaining} Items Remaining</h3>
                        <div style="background:#eee; height:12px; border-radius:6px; margin:15px 0; overflow:hidden;">
                            <div style="background:var(--accent); height:100%; width:${(checked/total || 0)*100}%; transition: width 0.4s ease;"></div>
                        </div>
                        <p style="margin:0; font-size:0.9rem; color:#666;">Packed ${checked} of ${total} items</p>
                    </div>
                `;
            }
        }

        function showPage(cat, btn) {
            const safeId = "page-" + cat.replace(/[^a-z0-9]/gi, '-').toLowerCase();
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            if (btn) btn.classList.add('active');
            document.querySelectorAll('.packing-page').forEach(p => p.classList.remove('active'));
            const targetPage = document.getElementById(safeId);
            if (targetPage) targetPage.classList.add('active');
        }

        function toggleAll(check) {
            const activePage = document.querySelector('.packing-page.active');
            if (!activePage) return;
            activePage.querySelectorAll('.gear-checkbox').forEach(i => {
                i.checked = check;
                i.closest('.item-card').classList.toggle('hidden', check);
            });
            updateSummary();
        }
    </script>
</body>
</html>
