<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PackHog Visual Packing List</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    
    <style>
        :root {
            --bg-color: #f0f2f5;
            --primary: #2c3e50;
            --accent: #27ae60;
            --card-bg: #ffffff;
            --danger: #e74c3c;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center;
            color: var(--primary);
            padding-bottom: 80px;
        }

        .config-panel {
            background: white; padding: 15px 25px; border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05); margin-bottom: 20px;
            display: flex; flex-direction: column; gap: 15px;
            width: 100%; max-width: 800px; align-items: center;
        }

        .toggle-row {
            display: flex; flex-wrap: wrap; justify-content: center; gap: 15px;
            font-weight: bold; border-bottom: 1px solid #eee; padding-bottom: 10px;
        }

        .toggle-row label { cursor: pointer; display: flex; align-items: center; gap: 5px; }

        .tabs { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; margin-bottom: 20px; }
        .tab-btn {
            padding: 10px 18px; cursor: pointer; border: none;
            background: #dcdde1; border-radius: 20px; font-weight: 600;
        }
        .tab-btn.active { background: var(--primary); color: white; }

        .controls { margin-bottom: 20px; }
        .btn { padding: 8px 16px; border-radius: 6px; border: none; cursor: pointer; font-weight: bold; margin: 0 5px; color: white; }
        .check-all { background: var(--accent); }
        .reset-btn { background: #7f8c8d; }

        #content-area { width: 100%; max-width: 800px; min-height: 300px; }
        .packing-page { display: none; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; }
        .packing-page.active { display: grid; }

        .item-card {
            background: var(--card-bg); padding: 12px; border-radius: 10px;
            text-align: center; box-shadow: 0 3px 6px rgba(0,0,0,0.1);
        }
        .item-card.hidden { display: none !important; }

        .img-container {
            width: 100%; height: 110px; background: #f8f9fa;
            border-radius: 6px; margin-bottom: 10px;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden; border: 1px solid #eee;
        }
        .img-container img { width: 100%; height: 100%; object-fit: cover; }

        #undo-btn {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: #333; color: white; padding: 10px 20px; border-radius: 30px;
            border: none; cursor: pointer; font-weight: bold; display: none; z-index: 100;
        }

        #summary-stats { width: 100%; max-width: 800px; margin-top: 30px; }
    </style>
</head>
<body>

    <h1>PackHog List</h1>

    <div class="config-panel">
        <div class="toggle-row">
            <label><input type="checkbox" class="activity-filter" value="hiking" checked onchange="initApp()"> 🥾 Hiking</label>
            <label><input type="checkbox" class="activity-filter" value="ice climbing" onchange="initApp()"> ⛏️ Ice</label>
            <label><input type="checkbox" class="activity-filter" value="rock climbing" onchange="initApp()"> 🧗 Rock</label>
            <label><input type="checkbox" class="activity-filter" value="skiing" onchange="initApp()"> ⛷️ Skiing</label>
            <label><input type="checkbox" id="overnight-check" onchange="initApp()"> 🌙 Overnight</label>
        </div>
        
        <div id="tabs-container" class="tabs"></div>

        <div class="controls">
            <button class="btn check-all" onclick="toggleAll(true)">Pack All on Page</button>
            <button class="btn reset-btn" onclick="clearProgress()">Reset All Progress</button>
        </div>
    </div>

    <div id="content-area"></div>
    <div id="summary-stats"></div>
    <button id="undo-btn" onclick="undoLast()">↺ Undo Last Item</button>

    <script>
        let gearData = [];
        let lastPacked = null;
        const STORAGE_KEY = 'packhog_packed_list';

        Papa.parse("dist/packhog.csv?v=" + Date.now(), {
            download: true,
            header: false, 
            skipEmptyLines: true,
            complete: function(results) {
                const rows = results.data;
                if (!rows || rows.length < 2) return;
                gearData = rows.slice(1).map(row => ({
                    category: row[0] ? row[0].trim() : "Misc",
                    name: row[1] ? row[1].trim() : "Unknown Item",
                    image: row[2] ? row[2].trim() : ""
                })).filter(item => item.category !== "");
                initApp(); 
            }
        });

        function getPacked() { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
        
        function setPacked(name, isPacked) {
            let packed = getPacked();
            if (isPacked) { if (!packed.includes(name)) packed.push(name); }
            else { packed = packed.filter(n => n !== name); }
            localStorage.setItem(STORAGE_KEY, JSON.stringify(packed));
        }

        function initApp() {
            const isOvernight = document.getElementById('overnight-check').checked;
            const activeActivities = Array.from(document.querySelectorAll('.activity-filter:checked')).map(cb => cb.value.toLowerCase());
            const packedList = getPacked();

            let categories = [...new Set(gearData.map(item => item.category))];
            categories = categories.filter(cat => {
                const lowCat = cat.toLowerCase();
                if (lowCat.includes('overnight') && !isOvernight) return false;
                const activityKeywords = ['hiking', 'skiing', 'rock climbing', 'ice climbing'];
                const matchesAnyActivity = activityKeywords.some(kw => lowCat.includes(kw));
                if (matchesAnyActivity) {
                    return activeActivities.some(act => lowCat.includes(act));
                }
                return true; 
            });

            document.getElementById('tabs-container').innerHTML = '';
            document.getElementById('content-area').innerHTML = '';

            categories.forEach((cat, index) => {
                const safeId = "page-" + cat.replace(/[^a-z0-9]/gi, '-').toLowerCase();
                const btn = document.createElement('button');
                btn.className = `tab-btn ${index === 0 ? 'active' : ''}`;
                btn.innerText = cat;
                btn.onclick = (e) => showPage(cat, e.target);
                document.getElementById('tabs-container').appendChild(btn);

                const page = document.createElement('div');
                page.id = safeId;
                page.className = `packing-page ${index === 0 ? 'active' : ''}`;
                
                gearData.filter(i => i.category === cat).forEach(item => {
                    const isPacked = packedList.includes(item.name);
                    const imgPath = item.image ? `dist/${item.image}` : null;
                    const imgHTML = imgPath ? `<img src="${imgPath}" onerror="this.parentElement.innerHTML='Image Missing'">` : `No Photo`;

                    page.innerHTML += `
                        <div class="item-card ${isPacked ? 'hidden' : ''}">
                            <div class="img-container">${imgHTML}</div>
                            <label><input type="checkbox" class="gear-checkbox" ${isPacked ? 'checked' : ''} onchange="handleCheck(this, '${item.name.replace(/'/g, "\\'")}')"> ${item.name}</label>
                        </div>`;
                });
                document.getElementById('content-area').appendChild(page);
            });
            updateSummary();
        }

        function handleCheck(cb, name) {
            setPacked(name, cb.checked);
            if (cb.checked) {
                lastPacked = name;
                document.getElementById('undo-btn').style.display = 'block';
                cb.closest('.item-card').classList.add('hidden');
            }
            updateSummary();
        }

        function undoLast() {
            if (lastPacked) {
                setPacked(lastPacked, false);
                lastPacked = null;
                document.getElementById('undo-btn').style.display = 'none';
                initApp();
            }
        }

        function updateSummary() {
            const total = gearData.length;
            const packedCount = getPacked().length;
            const remaining = total - packedCount;
            document.getElementById('summary-stats').innerHTML = `
                <div style="padding:20px; background:white; border-radius:12px; box-shadow:0 2px 8px rgba(0,0,0,0.05); text-align:center;">
                    <h3 style="margin:0;">${remaining} Items Remaining</h3>
                    <p style="margin:5px 0 0 0; color:#666;">Total Packed: ${packedCount} / ${total}</p>
                </div>`;
        }

        function showPage(cat, btn) {
            const safeId = "page-" + cat.replace(/[^a-z0-9]/gi, '-').toLowerCase();
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            if (btn) btn.classList.add('active');
            document.querySelectorAll('.packing-page').forEach(p => p.classList.remove('active'));
            document.getElementById(safeId).classList.add('active');
        }

        function toggleAll(check) {
            const activePage = document.querySelector('.packing-page.active');
            if (!activePage) return;
            activePage.querySelectorAll('.gear-checkbox').forEach(cb => {
                const name = cb.parentElement.innerText.trim();
                cb.checked = check;
                handleCheck(cb, name);
            });
        }

        function clearProgress() {
            if(confirm("Clear all packed items?")) {
                localStorage.removeItem(STORAGE_KEY);
                initApp();
            }
        }
    </script>
</body>
</html>
