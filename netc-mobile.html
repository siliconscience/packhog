<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Peak Insight</title>
    <style>
        body { font-family: sans-serif; max-width: 800px; margin: 20px auto; padding: 10px; background: #f4f7f6; }
        .search-area { background: white; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        #results { margin-top: 15px; display: none; }
        .error { color: #721c24; background: #f8d7da; padding: 10px; border-radius: 4px; margin-top: 10px; font-size: 0.9rem; }
        .debug-log { font-family: monospace; font-size: 11px; color: #666; background: #eee; padding: 10px; margin-top: 10px; overflow-x: auto; max-height: 80px; overflow-y: auto; }

        /* Calendar */
        .cal-wrap { overflow-x: auto; }
        .calendar { width: 100%; border-collapse: collapse; background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .calendar th { background: #2554C7; color: white; padding: 6px 2px; text-align: center; font-size: 12px; }
        .calendar td { border: 1px solid #e0e0e0; padding: 4px; vertical-align: top; width: 14.2%; min-height: 44px; }
        .calendar td.today { background: #fff3cd; }
        .calendar td.future { background: #f9f9f9; color: #bbb; }
        .date-num { font-size: 10px; color: #999; margin-bottom: 2px; }
        .calendar td.today .date-num { font-weight: bold; color: #c07000; }
        .report-link { display: block; font-size: 11px; color: #2554C7; text-decoration: none; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 1px; }
        .report-link:hover { text-decoration: underline; }

        /* Report panel */
        #report-panel { display: none; margin-top: 15px; background: white; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        #report-panel h4 { margin: 0 0 10px 0; color: #2554C7; }
        #report-panel p { margin: 5px 0; font-size: 0.95rem; }
        .comments-box { margin-top: 12px; padding: 10px; background: #f9f9f9; border-left: 4px solid #2ecc71; font-size: 0.95rem; line-height: 1.5; }
    </style>
    <script src="./search.js"></script>
</head>
<body>

    <div class="search-area">
        <h3 style="margin:0 0 10px 0">Peak Insight</h3>
        <input type="text" id="peakInput" placeholder="Monadnock" style="padding:8px; width:55%; font-size:16px;">
        <button onclick="runSearch()" style="padding:8px 14px; cursor:pointer; font-size:16px;">Search</button>
        <div id="status" style="margin-top:8px; font-size:0.9rem; color:#555;">Ready.</div>
    </div>

    <div id="results">
        <div id="output-content"></div>
        <div id="report-panel"></div>
    </div>

    <div id="debug" class="debug-log">Logs will appear here...</div>

</body>
</html>
