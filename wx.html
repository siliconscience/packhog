<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mountain Weather</title>
  <link rel="stylesheet" href="wx.css">
  <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
</head>
<body>
  <div class="container">
    <div style="display:flex; align-items:center; gap:8px; margin-bottom:4px;">
      <h1 style="margin:0; flex:1;">Mountain Weather</h1>
      <nav style="display:flex; gap:6px;">
        <a href="index.html" style="padding:4px 10px; border-radius:14px; background:rgba(39,174,96,0.12); color:#27ae60; border:1px solid rgba(39,174,96,0.35); text-decoration:none; font-size:0.8rem; font-weight:600; white-space:nowrap;">🎒 Packing</a>
        <a href="netc-mobile.html" style="padding:4px 10px; border-radius:14px; background:rgba(39,174,96,0.12); color:#27ae60; border:1px solid rgba(39,174,96,0.35); text-decoration:none; font-size:0.8rem; font-weight:600; white-space:nowrap;">🥾 Trail</a>
      </nav>
    </div>
    <p class="subtitle">7-day forecast — temperature, precipitation, and wind</p>
    <form id="search-form">
      <div class="input-row">
        <input type="text" id="location-input" placeholder="Enter a location (e.g. Denali, Rainier, Flagstaff)" autocomplete="off">
        <button type="submit">Search</button>
      </div>
    </form>
    <p id="status"></p>
    <div id="charts">
      <div id="chart-temp" class="chart-panel"></div>
      <div id="chart-pop" class="chart-panel"></div>
      <div id="chart-wind" class="chart-panel"></div>
    </div>
    <div id="strip"></div>
  </div>
  <script src="wx.js"></script>
</body>
</html>
